JOBS: 12
TEST_ONLY: false
LOG_INTERVAL: 10
TRAIN_BATCH_SIZE: 8
VAL_BATCH_SIZE: 8
START_EPOCH: 0
END_EPOCH: 80
VAL_INTERVAL: 1
MODEL_SANING_INTERVAL: 1
MIX_PRECISION: false
RESUME:
  PATH: null
  TYPE: null
  SET_EPOCH: true
LAUNCHER: ParallelLaunch
SEED: 9527
IS_CUDA: true
OPTIMIZER:
  NAME: Adam
  LR: 0.0002
  LR_SCHEDULER: cosine
  end_epoch: 80
LOSS:
  - NAME: l1_charbonnier_loss
    WEIGHT: 1
METRICS:
  - NAME: PSNR
  - NAME: PSNR-Linear_N
  - NAME: SSIM
DATASET:
  NAME: see_everything_everytime_dataset
  root: /root/autodl-tmp/data/SEE-600K/RoboticArm/
  in_frames: 1
  crop_h: 256
  crop_w: 256
  sample_step: 50
  event_representation_config:
    type: voxel_grid
    channel: 80
    scale: 5
    to_bin: true
  testing_mapping_type:
    - "high-normal"
    - "normal-normal"
    - "low-normal"
  training_mapping_type:
    - "high-normal"
    - "low-normal"
    - "normal-normal"
MODEL:
  NAME: EventImageFusionTransformer
  event_moments: 80
  H: 256
  W: 256
VISUALIZATION:
  folder: ./vis
  tag: EIFT_AAAI_SEE-v1
  intermediate_visualization: false
  ONLY_VIS: false
